{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.istio.gateway.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
spec:
  selector:
    istio: {{ .Values.istio.gateway.selector }}
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.istio.tlsSecretName }}
      hosts:
        - {{ .Values.istio.host }}
    - port:
        number: 80
        name: http-redirect
        protocol: HTTP
      hosts:
        - {{ .Values.istio.host }}
      tls:
        httpsRedirect: true
{{- end }}
