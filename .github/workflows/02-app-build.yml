name: "02 · App Build & Push"

on:
  push:
    branches: [main]
    paths:
      - "app/**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (defaults to git SHA)"
        required: false

permissions:
  contents: read

env:
  DOCKER_IMAGE: simoganger/taskmanager

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          SHORT="${TAG::7}"
          echo "tag=$TAG"    >> $GITHUB_OUTPUT
          echo "short=$SHORT" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Image digest
        run: echo "Pushed ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}"

      - name: Update Helm values with new tag
        if: ${{ github.event_name == 'push' }}
        run: |
          sed -i "s/tag: .*/tag: ${{ steps.tag.outputs.tag }}/" helm/taskmanager/values.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/taskmanager/values.yaml
          git diff --staged --quiet || git commit -m "chore: update image tag to ${{ steps.tag.outputs.short }}"
          git push
